name: blu-ray-index-clean-packages
on:
  push:
    branches:
      - main

jobs:
  clean-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Clean backend container packages
        uses: actions/delete-package-versions@v5
        with:
          package-name: blu-ray-index/blu-ray-index-go
          package-type: 'container'
          min-versions-to-keep: 3
          token: ${{ secrets.REGISTRY_TOKEN }}

      - name: Clean frontend container packages
        uses: actions/delete-package-versions@v5
        with:
          package-name: blu-ray-index/blu-ray-index-frontend
          package-type: 'container'
          min-versions-to-keep: 3
          token: ${{ secrets.REGISTRY_TOKEN }}
